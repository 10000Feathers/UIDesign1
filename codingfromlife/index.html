<!DOCTYPE html>
<html>
<head>
    <title>CSS Still Life</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="assets/css/main.css" type="text/css" />
</head>

<body>
    <div id="align">
        <div id="stage">

            <div id="wall"></div>
            <div id="table"></div>

            <div id="tray"></div>
            <div id="tray-inner"></div>

            <div id="plate"></div>
            <div id="cake"></div>
            <div id="cake-side"></div>

            <div id="drink-left" class="drink">
                <div class="ice ice1"></div>
                <div class="ice ice2"></div>
                <div class="lemon"></div>
                <div class="straw"></div>
            </div>

            <div id="drink-right" class="drink">
                <div class="ice ice3"></div>
                <div class="ice ice4"></div>
                <div class="lemon"></div>
                <div class="straw"></div>
            </div>

            <div id="napkin"></div>
            <div id="fork1" class="fork"></div>
            <div id="fork2" class="fork"></div>

        </div>
    </div>
</body>
</html>
